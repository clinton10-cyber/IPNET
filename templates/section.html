{% extends "base.html" %}
{% block title %}{{ label }} - IPNET{% endblock %}
{% block content %}
<section class="page-header">
  <h1>{{ label }}</h1>
  <form class="inline-search" method="get">
    <input type="text" name="q" placeholder="Filter within {{ label }}..." value="{{ q }}">
    <button type="submit">Filter</button>
  </form>
</section>
<div class="grid cat-grid">
  {% for c in categories %}
  <a class="card cat-card" href="{{ url_for('category_view', cat_id=c['id']) }}">
    <div class="cat-icon">{{ c['icon'] }}</div>
    <div class="cat-name">{{ c['name'] }}</div>
  </a>
  {% else %}
  <p>No categories found.</p>
  {% endfor %}
</div>
{% endblock %}
