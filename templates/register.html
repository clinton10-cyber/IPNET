{% extends "base.html" %}
{% block title %}Create Account - IPNET{% endblock %}
{% block content %}
<section class="page-header"><h1>Create your IPNET account</h1></section>
<div class="card" style="max-width:420px;margin:0 auto 40px;">
  <form method="post" class="stack-form">
    <input type="text" name="full_name" placeholder="Full name">
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>
    <input type="text" name="country" placeholder="Country">
    <button type="submit" class="btn-primary">Create Account</button>
  </form>
  <p class="muted" style="margin-top:14px;">Already have an account? <a href="{{ url_for('login') }}" style="color:var(--accent);">Log in</a></p>
</div>
{% endblock %}
