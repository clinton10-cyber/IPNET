{% extends "admin_base.html" %}
{% block admin_content %}
<h1>Screenshots — {{ listing['title'] }}</h1>
<p class="muted"><a href="{{ url_for('admin_listings') }}">← Back to listings</a></p>

<div class="card">
  <h3>Add Screenshots</h3>
  <form method="post" action="{{ url_for('admin_add_listing_images', listing_id=listing['id']) }}" enctype="multipart/form-data" class="inline-form">
    <input type="file" name="gallery_files" accept="image/png,image/jpeg,image/webp,image/gif" multiple required>
    <button type="submit" class="btn-primary">Upload</button>
  </form>
</div>

<div class="grid cat-grid" style="margin-top:16px;">
  {% for img in images %}
  <div class="card" style="text-align:center;">
    <img src="{{ img['image_url'] }}" alt="" style="width:100%;height:140px;object-fit:cover;border-radius:8px;margin-bottom:10px;">
    <form method="post" action="{{ url_for('admin_delete_listing_image', image_id=img['id']) }}" onsubmit="return confirm('Remove this screenshot?')">
      <button type="submit" class="btn-danger-sm">Remove</button>
    </form>
  </div>
  {% else %}
  <p>No screenshots uploaded yet.</p>
  {% endfor %}
</div>
{% endblock %}
