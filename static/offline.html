<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're offline - IPNET</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" href="/static/icons/icon-192.png">
<style>
  :root {
    --bg: #0b0e14; --card: #171d2e; --border: #26304a; --text: #e7ebf5;
    --muted: #8b93a8; --accent: #5b7fff; --accent2: #22d3a5;
  }
  @media (prefers-color-scheme: light) {
    :root { --bg:#f5f7fb; --card:#ffffff; --border:#dde3ef; --text:#171b26; --muted:#6b7488; --accent:#3d5fe0; --accent2:#0f9d78; }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    padding: 24px;
  }
  .box { text-align: center; max-width: 360px; }
  .icon {
    width: 56px; height: 56px; border-radius: 14px; margin: 0 auto 16px;
    background: var(--card); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
  }
  .icon svg { width: 26px; height: 26px; stroke: var(--accent2); }
  h1 { font-size: 1.2rem; margin: 0 0 8px; }
  p { color: var(--muted); font-size: 0.9rem; line-height: 1.5; margin: 0 0 20px; }
  button {
    background: var(--accent); color: #fff; border: none; padding: 10px 20px;
    border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer;
  }
</style>
</head>
<body>
  <div class="box">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>IPNET can't reach the network right now. Check your connection and try again — anything you had open should reload once you're back online.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
